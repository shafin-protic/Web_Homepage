<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Shafin's Space</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23000000' rx='24'/%3E%3Cpath fill='%233b82f6' d='M30 30h40a4 4 0 0 1 4 4v32a4 4 0 0 1-4 4H30a4 4 0 0 1-4-4V34a4 4 0 0 1 4-4zm5 12v20h30V42H35z'/%3E%3Ccircle cx='68' cy='36' r='3.5' fill='%23facc15'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e5e7eb;
            height: 100vh;
            overflow: hidden;
        }
        .hide-scrollbar {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 1rem 1.5rem;
            gap: 0.8rem;
            overflow: hidden;
        }
        
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .title-section {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .profile-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: #1f2937;
            border: 2px solid #3b82f6;
        }
        .page-title h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff9999, #ffdd99, #ffcc99, #ff9999);
            background-size: 300% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: titleShine 4s ease-in-out infinite;
            letter-spacing: 1px;
        }
        @keyframes titleShine {
            0% { background-position: 0% center; opacity: 0.9; }
            50% { background-position: 100% center; opacity: 1; }
            100% { background-position: 0% center; opacity: 0.9; }
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            position: relative;
        }
        .clock-date { text-align: right; }
        .clock { font-size: 1.2rem; font-weight: 600; font-family: monospace; }
        .date { font-size: 0.65rem; color: #9ca3af; }
        .icon-btn {
            background: #1f2937;
            border: none;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            cursor: pointer;
            color: white;
            font-size: 0.9rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover { background: #374151; transform: scale(1.05); }
        
        /* Calendar Popup */
        .calendar-popup {
            position: fixed;
            background: #111;
            border: 1px solid #333;
            border-radius: 1rem;
            padding: 1rem;
            width: 320px;
            z-index: 10001;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .calendar-header button {
            background: #1f2937;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 0.5rem;
            color: white;
            cursor: pointer;
        }
        .calendar-header button:hover { background: #374151; }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            gap: 0.3rem;
        }
        .calendar-weekday { font-size: 0.7rem; color: #9ca3af; padding: 0.3rem; }
        .calendar-day {
            padding: 0.5rem;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 0.5rem;
            position: relative;
        }
        .calendar-day:hover { background: #1f2937; }
        .friday-sat { color: #ef4444; }
        .current-day { background: #3b82f6; color: white; }
        .holiday-day {
            background: #7f1a1a;
            color: #ffcccc;
            font-weight: bold;
            position: relative;
        }
        .holiday-day::after {
            content: "🎉";
            position: absolute;
            top: -2px;
            right: 2px;
            font-size: 8px;
        }
        .holiday-tooltip {
            position: fixed;
            background: #1f2937;
            color: #ffcccc;
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            font-size: 0.7rem;
            z-index: 10002;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            border: 1px solid #ef4444;
            max-width: 200px;
            white-space: normal;
            word-break: break-word;
        }
        
        .folder-popup {
            position: fixed;
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 0.75rem;
            min-width: 260px;
            max-width: 320px;
            max-height: 400px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            padding: 0.5rem 0;
        }
        .popup-item {
            padding: 0.6rem 1rem;
            color: #e5e7eb;
            text-decoration: none;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.1s;
            width: 100%;
            text-align: left;
            background: transparent;
            border: none;
        }
        .popup-item:hover { background: #1f2937; }
        .popup-item img { width: 16px; height: 16px; }
        .popup-folder { justify-content: space-between; }
        .back-button {
            border-bottom: 1px solid #333;
            margin-bottom: 0.3rem;
            color: #3b82f6;
        }
        .back-button i { margin-right: 8px; }
        
        .top-bar {
            display: flex;
            gap: 1rem;
            flex-shrink: 0;
        }
        .search-engine-wrapper, .bookmark-search-wrapper {
            flex: 1;
            position: relative;
        }
        .search-container {
            display: flex;
            align-items: center;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            border-radius: 2.5rem;
            padding: 0.3rem 0.5rem;
            transition: all 0.2s;
        }
        .search-container:focus-within {
            border-color: #3b82f6;
            background: #050505;
        }
        .engine-icon-display {
            background: transparent;
            margin-left: 0.5rem;
            margin-right: 0.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .engine-icon-display img { width: 20px; height: 20px; border-radius: 4px; }
        .search-container input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 0.85rem;
            padding: 0.5rem 0.8rem;
            outline: none;
        }
        .search-container input::placeholder { color: #4b5563; }
        .search-engine-wrapper .search-container button {
            background: #0d9488;
            border: none;
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .search-engine-wrapper .search-container button:hover { background: #0f766e; }
        .bookmark-search-wrapper .search-container button {
            background: #1d4ed8;
            border: none;
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .bookmark-search-wrapper .search-container button:hover { background: #1e40af; }
        
        .dropdown {
            position: absolute;
            top: 110%;
            left: 0;
            right: 0;
            background: #0f0f0f;
            border: 1px solid #2c2c2c;
            border-radius: 1rem;
            z-index: 200;
            max-height: 280px;
            overflow-y: auto;
        }
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.7rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid #1e1e1e;
            text-decoration: none;
            color: #e5e7eb;
        }
        .dropdown-item:hover { background: #1f2937; }
        .dropdown-item img { width: 20px; height: 20px; }

        .bookmark-section { flex-shrink: 0; }
        .section-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.3rem;
        }
        .toggle-icon {
            background: #1f2937;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #9ca3af;
            transition: 0.2s;
            cursor: pointer;
        }
        .toggle-icon:hover { background: #374151; color: white; }
        .section-label { font-size: 0.7rem; color: #6b7280; letter-spacing: 0.5px; cursor: default; }
        .bookmark-bar {
            background: transparent;
            transition: all 0.2s ease;
            overflow: visible;
        }
        .bookmark-bar.collapsed { display: none; }
        .bookmark-bar-inner {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
            align-items: center;
        }
        .folder-btn {
            background: transparent;
            border: none;
            color: #e5e7eb;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 0.5rem;
            transition: 0.1s;
        }
        .folder-btn:hover { background: #1f2937; }
        .folder-btn i { color: #f59e0b; }
        .bookmark-link { text-decoration: none; }

        .categories-section {
            flex: 1;
            overflow-y: auto;
        }
        .category-row { margin-bottom: 1.5rem; }
        .category-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #9ca3af;
            margin-bottom: 0.6rem;
            border-left: 3px solid #3b82f6;
            padding-left: 0.7rem;
        }
        .equal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            gap: 0.8rem;
            width: 100%;
        }
        .clean-app-tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: transform 0.15s;
            background: transparent;
            padding: 0.3rem;
        }
        .clean-app-tile:hover { transform: translateY(-3px); }
        .direct-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.3rem;
        }
        .direct-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .clean-app-tile span {
            font-size: 0.6rem;
            font-weight: 500;
            text-align: center;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #bbbbbb;
        }
        .empty-cat { color: #4b5563; font-size: 0.85rem; padding: 1rem; text-align: center; }
        .cache-indicator {
            position: fixed;
            bottom: 8px;
            right: 8px;
            font-size: 0.6rem;
            color: #4b5563;
            background: #0a0a0a;
            padding: 2px 6px;
            border-radius: 4px;
            z-index: 999;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header-row">
        <div class="title-section">
            <img class="profile-img" id="profileImage" src="https://i.postimg.cc/yYbyhL4w/Rounded-Profile.png" alt="Profile" onerror="this.onerror=null; this.style.display='none'; document.getElementById('fallbackIcon').style.display='flex';">
            <div id="fallbackIcon" style="display: none; width: 40px; height: 40px; border-radius: 50%; background: #3b82f6; align-items: center; justify-content: center;">
                <i class="fas fa-user" style="color: white; font-size: 1.2rem;"></i>
            </div>
            <div class="page-title"><h1>Shafin's Space</h1></div>
        </div>
        <div class="header-right">
            <button class="icon-btn" id="editSheetBtn" title="Edit Google Sheet"><i class="fas fa-pen"></i></button>
            <button class="icon-btn" id="refreshCsvBtn" title="Refresh Categories"><i class="fas fa-sync-alt"></i></button>
            <button class="icon-btn" id="calendarBtn" title="Calendar"><i class="fas fa-calendar-alt"></i></button>
            <div class="clock-date">
                <div class="clock" id="clockDisplay">--:--:--</div>
                <div class="date" id="dateDisplay">Loading...</div>
            </div>
        </div>
    </div>
    
    <div class="top-bar">
        <div class="search-engine-wrapper">
            <div class="search-container">
                <div class="engine-icon-display" id="engineSelectorBtn">
                    <img id="currentEngineIcon" src="https://www.google.com/s2/favicons?domain=google.com" alt="">
                </div>
                <input type="text" id="engineQueryInput" placeholder="Search the web...">
                <button id="engineSearchBtn"><i class="fas fa-search"></i></button>
            </div>
            <div id="engineDropdown" class="dropdown" style="display: none;"></div>
        </div>
        <div class="bookmark-search-wrapper">
            <div class="search-container">
                <i class="fas fa-bookmark" style="margin-left: 0.8rem; color: #6b7280;"></i>
                <input type="text" id="bookmarkSearchInput" placeholder="Search bookmarks...">
                <button id="clearBookmarkSearch"><i class="fas fa-times"></i></button>
            </div>
            <div id="bookmarkSearchDropdown" class="dropdown" style="display: none;"></div>
        </div>
    </div>

    <div class="bookmark-section">
        <div class="section-header">
            <div class="toggle-icon" id="toggleIconBtn">
                <i class="fas fa-chevron-up" id="toggleIcon"></i>
            </div>
            <div class="section-label">BOOKMARK BAR</div>
        </div>
        <div class="bookmark-bar" id="bookmarkBarContainer">
            <div class="bookmark-bar-inner">Loading bookmarks...</div>
        </div>
    </div>

    <div class="categories-section hide-scrollbar" id="categoriesContainer">
        <div class="empty-cat">Loading categories...</div>
    </div>
    <div class="cache-indicator" id="cacheIndicator">Loading...</div>
</div>

<script>
    // ==================== CONFIGURATION ====================
    const CSV_BOOKMARKS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSxVk_HHPGsnAkM1qeSshRjzRXQ7BhKbk2OFTy-nurrhUQSCd7lz3LFOahHU_nqYd9OIxIu5wkzXEZZ/pub?gid=26452786&single=true&output=csv";
    const SEARCH_ENGINES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSxVk_HHPGsnAkM1qeSshRjzRXQ7BhKbk2OFTy-nurrhUQSCd7lz3LFOahHU_nqYd9OIxIu5wkzXEZZ/pub?gid=1271015321&single=true&output=csv";
    const JSON_BOOKMARKS_URL = "https://raw.githubusercontent.com/shafin-protic/Web_Bookmarks/refs/heads/main/Web_Bookmarks.json";
    const EDIT_SHEET_URL = "https://docs.google.com/spreadsheets/d/1ErgYkvSzc1CtNPGYAjMV4TeQqMH6tEV-l7DPT6faBPQ/edit?usp=sharing";
    const HOLIDAYS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTqj7nPwQGlbfP83LpgQf0ysTIO4NCv83liMZI-KtP2YrduRWWzLrv97Nwaj9h1Id1IXMg4LPII14lI/pub?gid=2070009302&single=true&output=csv";
    
    const CACHE_KEY_CATEGORIES = 'shafin_categories_cache';
    const CACHE_KEY_HOLIDAYS = 'shafin_holidays_cache';
    const CACHE_KEY_SEARCH_ENGINES = 'shafin_search_engines_cache';
    const CACHE_KEY_TOOLBAR = 'shafin_toolbar_cache';
    const CACHE_DURATION = 24 * 60 * 60 * 1000; // 24 hours
    
    // ==================== GLOBAL STATE ====================
    let csvCategoryBookmarks = [];
    let searchEngines = [];
    let currentEngine = null;
    let allBookmarksForSearch = [];
    let toolbarItems = [];
    let activePopup = null;
    let isBookmarkBarCollapsed = false;
    let holidayMap = new Map();
    
    // ==================== UTILITY FUNCTIONS ====================
    function getFavicon(url) {
        try { const domain = new URL(url).hostname; return `https://www.google.com/s2/favicons?domain=${domain}&sz=64`; } catch(e) { return ""; }
    }
    function escapeHtml(str) { 
        if (!str) return '';
        return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    function parseDMYToYMD(dateStr) {
        if (!dateStr) return null;
        let parts = dateStr.split(/[-/]/);
        if (parts.length < 3) return null;
        let day = parts[0].padStart(2, '0');
        let month = parts[1].padStart(2, '0');
        let year = parts[2];
        if (year.length === 2) year = parseInt(year) + 2000;
        return `${year}-${month}-${day}`;
    }
    function formatDateToYMD(date) {
        return date.toISOString().split('T')[0];
    }
    
    // ==================== CACHED FETCH ====================
    async function fetchWithCache(url, cacheKey, forceRefresh = false) {
        if (!forceRefresh) {
            const cached = localStorage.getItem(cacheKey);
            if (cached) {
                try {
                    const { data, timestamp } = JSON.parse(cached);
                    if (Date.now() - timestamp < CACHE_DURATION) {
                        console.log(`Using cached: ${cacheKey}`);
                        return data;
                    }
                } catch(e) {}
            }
        }
        const res = await fetch(url);
        const text = await res.text();
        const data = text;
        localStorage.setItem(cacheKey, JSON.stringify({ data, timestamp: Date.now() }));
        return data;
    }
    
    async function fetchCSV(url, cacheKey, forceRefresh = false) {
        const text = await fetchWithCache(url, cacheKey, forceRefresh);
        const rows = text.split(/\r?\n/).filter(l => l.trim());
        return rows.map(row => {
            const regex = /(".*?"|[^,]*)(,|$)/g;
            const cols = [];
            let match;
            while ((match = regex.exec(row)) !== null) {
                let val = match[1];
                if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1);
                cols.push(val.trim());
                if (match[2] !== ",") break;
            }
            return cols;
        });
    }
    
    // ==================== DATA LOADERS WITH CACHE ====================
    async function loadHolidays(forceRefresh = false) {
        try {
            const rows = await fetchCSV(HOLIDAYS_CSV_URL, CACHE_KEY_HOLIDAYS, forceRefresh);
            if (rows.length < 2) return;
            const holidays = new Map();
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (row.length < 2) continue;
                let startDateStr = row[1];
                let endDateStr = row[2];
                let subject = row[3] || "Holiday";
                let description = row[4] || "";
                let startYMD = parseDMYToYMD(startDateStr);
                let endYMD = endDateStr ? parseDMYToYMD(endDateStr) : startYMD;
                if (!startYMD) continue;
                let startDate = new Date(startYMD);
                let endDate = endYMD ? new Date(endYMD) : startDate;
                if (isNaN(startDate.getTime())) continue;
                let current = new Date(startDate);
                let end = new Date(endDate);
                while (current <= end) {
                    let dateKey = formatDateToYMD(current);
                    holidays.set(dateKey, { subject, description, startDate: startDateStr, endDate: endDateStr });
                    current.setDate(current.getDate() + 1);
                }
            }
            holidayMap = holidays;
            document.getElementById('cacheIndicator').innerHTML = `📅 ${holidayMap.size} holidays cached`;
        } catch(e) { 
            console.warn("Could not load holidays", e);
            document.getElementById('cacheIndicator').innerHTML = `⚠️ Using cached holidays`;
        }
    }
    
    async function loadCsvCategoryBookmarks(forceRefresh = false) {
        try {
            const rows = await fetchCSV(CSV_BOOKMARKS_URL, CACHE_KEY_CATEGORIES, forceRefresh);
            if (rows.length < 2) return [];
            const data = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (row.length < 3) continue;
                const name = row[0];
                const url = row[1];
                const category = row[2] || "Uncategorized";
                const icon = row[3] || "";
                if (name && url && url.startsWith("http")) {
                    data.push({ name, url, category: category.trim(), icon });
                }
            }
            return data;
        } catch(e) { console.error(e); return []; }
    }
    
    async function loadSearchEngines(forceRefresh = false) {
        try {
            const rows = await fetchCSV(SEARCH_ENGINES_URL, CACHE_KEY_SEARCH_ENGINES, forceRefresh);
            if (rows.length < 2) return [{ name: "Google", urlTemplate: "https://www.google.com/search?q=%s", active: true, icon: "" }];
            const engines = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (row.length < 3) continue;
                const name = row[0];
                let urlTemplate = row[1];
                const useIt = row[2]?.toLowerCase();
                let icon = row[3] || "";
                if (urlTemplate && !urlTemplate.includes("%s")) {
                    urlTemplate += urlTemplate.includes("?") ? "&q=%s" : "?q=%s";
                }
                const active = (useIt === "yes" || useIt === "y" || useIt === "true");
                engines.push({ name, urlTemplate, active, icon });
            }
            if (engines.length === 0) engines.push({ name: "Google", urlTemplate: "https://www.google.com/search?q=%s", active: true, icon: "" });
            return engines;
        } catch(e) { return [{ name: "Google", urlTemplate: "https://www.google.com/search?q=%s", active: true, icon: "" }]; }
    }
    
    // ==================== JSON BOOKMARK PARSING ====================
    function extractToolbarChildren(jsonData) {
        if (!jsonData || !jsonData.children) return [];
        function findToolbar(node) {
            if (node.root === "toolbarFolder") return node.children;
            if (node.children) { for (const c of node.children) { const found = findToolbar(c); if (found) return found; } }
            return null;
        }
        return findToolbar(jsonData) || [];
    }
    
    function convertNode(node) {
        if (!node) return null;
        const item = { title: node.title || "", type: node.typeCode === 2 ? "folder" : (node.typeCode === 1 ? "bookmark" : null), uri: node.uri, children: [], iconUri: node.iconUri };
        if (item.type === "folder" && node.children) {
            for (const child of node.children) {
                const converted = convertNode(child);
                if (converted && ((converted.type === "bookmark" && converted.uri) || (converted.type === "folder" && converted.children.length > 0))) item.children.push(converted);
            }
            return item;
        }
        if (item.type === "bookmark" && item.uri && item.uri.startsWith("http")) return item;
        return null;
    }
    
    async function loadToolbar(forceRefresh = false) {
        try {
            let jsonData;
            if (!forceRefresh) {
                const cached = localStorage.getItem(CACHE_KEY_TOOLBAR);
                if (cached) {
                    const { data, timestamp } = JSON.parse(cached);
                    if (Date.now() - timestamp < CACHE_DURATION) {
                        jsonData = data;
                    }
                }
            }
            if (!jsonData) {
                const res = await fetch(JSON_BOOKMARKS_URL);
                jsonData = await res.json();
                localStorage.setItem(CACHE_KEY_TOOLBAR, JSON.stringify({ data: jsonData, timestamp: Date.now() }));
            }
            const toolbarRaw = extractToolbarChildren(jsonData);
            const items = [];
            for (const child of toolbarRaw) { const conv = convertNode(child); if (conv) items.push(conv); }
            return items;
        } catch(e) { console.error(e); return []; }
    }
    
    // ==================== UI RENDERING ====================
    function flattenForSearch(items, arr = []) {
        for (const item of items) {
            if (item.type === "bookmark" && item.uri) arr.push({ name: item.title, url: item.uri });
            if (item.children) flattenForSearch(item.children, arr);
        }
        return arr;
    }
    
    function closePopup() {
        if (activePopup) { activePopup.remove(); activePopup = null; }
    }
    
    function showFolderPopup(folderItem, buttonElement, parentFolder = null) {
        if (activePopup) activePopup.remove();
        const popup = document.createElement('div');
        popup.className = 'folder-popup hide-scrollbar';
        let html = '';
        if (parentFolder) {
            html += `<button class="popup-item back-button" data-back="true"><i class="fas fa-arrow-left"></i> Back to ${escapeHtml(parentFolder.title)}</button>`;
        }
        for (const item of folderItem.children) {
            if (item.type === "bookmark") {
                const icon = item.iconUri && item.iconUri.startsWith("http") ? item.iconUri : getFavicon(item.uri);
                html += `<a href="${escapeHtml(item.uri)}" target="_blank" class="popup-item"><img src="${icon}" onerror="this.src='${getFavicon(item.uri)}';"> ${escapeHtml(item.title.length > 40 ? item.title.slice(0,37)+'..' : item.title)}</a>`;
            } else if (item.type === "folder" && item.children && item.children.length > 0) {
                html += `<button class="popup-item popup-folder" data-subfolder='${JSON.stringify({title: item.title})}'><span><i class="fas fa-folder"></i> ${escapeHtml(item.title)}</span><i class="fas fa-chevron-right"></i></button>`;
            }
        }
        if (html === '') html = '<div class="popup-item" style="color:#6b7280;">Empty folder</div>';
        popup.innerHTML = html;
        const rect = buttonElement.getBoundingClientRect();
        popup.style.position = 'fixed';
        popup.style.top = `${rect.bottom + 5}px`;
        popup.style.left = `${rect.left}px`;
        if (rect.left + 280 > window.innerWidth) popup.style.left = `${window.innerWidth - 290}px`;
        if (rect.bottom + 400 > window.innerHeight) popup.style.top = `${rect.top - 420}px`;
        document.body.appendChild(popup);
        activePopup = popup;
        popup.querySelectorAll('[data-subfolder]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const subData = JSON.parse(btn.getAttribute('data-subfolder'));
                const subFolder = folderItem.children.find(c => c.title === subData.title);
                if (subFolder) showFolderPopup(subFolder, btn, folderItem);
            });
        });
        const backBtn = popup.querySelector('[data-back="true"]');
        if (backBtn && parentFolder) {
            backBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                showFolderPopup(parentFolder, buttonElement, null);
            });
        }
        const closeHandler = (e) => {
            if (!popup.contains(e.target) && e.target !== buttonElement && !buttonElement.contains(e.target)) {
                closePopup();
                document.removeEventListener('click', closeHandler);
            }
        };
        setTimeout(() => document.addEventListener('click', closeHandler), 100);
    }
    
    function renderBookmarkBar(items) {
        const container = document.getElementById("bookmarkBarContainer");
        if (!items || items.length === 0) { container.innerHTML = '<div class="bookmark-bar-inner">No toolbar bookmarks</div>'; return; }
        let html = '<div class="bookmark-bar-inner">';
        for (let idx = 0; idx < items.length; idx++) {
            const item = items[idx];
            if (item.type === "bookmark") {
                const icon = item.iconUri && item.iconUri.startsWith("http") ? item.iconUri : getFavicon(item.uri);
                html += `<a href="${escapeHtml(item.uri)}" target="_blank" class="folder-btn bookmark-link"><img src="${icon}" style="width:14px;height:14px;"> ${escapeHtml(item.title.length > 18 ? item.title.slice(0,15)+'..' : item.title)}</a>`;
            } else if (item.type === "folder" && item.children && item.children.length > 0) {
                html += `<button class="folder-btn" data-folder-idx="${idx}"><i class="fas fa-folder"></i> ${escapeHtml(item.title.length > 18 ? item.title.slice(0,15)+'..' : item.title)} <i class="fas fa-chevron-down"></i></button>`;
            }
        }
        html += '</div>';
        container.innerHTML = html;
        document.querySelectorAll('.folder-btn[data-folder-idx]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(btn.getAttribute('data-folder-idx'));
                const folderItem = items[idx];
                if (folderItem && folderItem.type === 'folder') showFolderPopup(folderItem, btn, null);
            });
        });
    }
    
    function renderCategories() {
        const container = document.getElementById("categoriesContainer");
        const categories = ["Cat A", "Cat B", "Cat C", "Cat D", "Cat E"];
        const grouped = { "Cat A": [], "Cat B": [], "Cat C": [], "Cat D": [], "Cat E": [] };
        csvCategoryBookmarks.forEach(b => { if (grouped[b.category]) grouped[b.category].push(b); });
        let html = "", hasAny = false;
        for (let cat of categories) {
            const items = grouped[cat];
            if (items.length === 0) continue;
            hasAny = true;
            html += `<div class="category-row"><div class="category-title">${cat}</div><div class="equal-grid">`;
            items.forEach(item => {
                const iconUrl = (item.icon && item.icon.startsWith("http")) ? item.icon : getFavicon(item.url);
                html += `<a href="${escapeHtml(item.url)}" target="_blank" class="clean-app-tile"><div class="direct-icon"><img src="${iconUrl}" onerror="this.src='${getFavicon(item.url)}';"></div><span>${escapeHtml(item.name.length > 14 ? item.name.slice(0,12)+'..' : item.name)}</span></a>`;
            });
            html += `</div></div>`;
        }
        if (!hasAny) html = '<div class="empty-cat">No categories found.</div>';
        container.innerHTML = html;
    }
    
    function updateBookmarkSearchPopup(query) {
        const dropdown = document.getElementById("bookmarkSearchDropdown");
        if (!query.trim()) { dropdown.style.display = "none"; return; }
        const matches = allBookmarksForSearch.filter(b => b.name.toLowerCase().includes(query.toLowerCase()));
        if (matches.length === 0) { dropdown.style.display = "none"; return; }
        let html = "";
        matches.slice(0, 15).forEach(b => {
            const icon = getFavicon(b.url);
            html += `<a href="${escapeHtml(b.url)}" target="_blank" class="dropdown-item"><img src="${icon}"> ${escapeHtml(b.name.length > 50 ? b.name.slice(0,47)+'..' : b.name)}</a>`;
        });
        dropdown.innerHTML = html;
        dropdown.style.display = "block";
    }
    
    function renderEngineDropdown() {
        const dropdown = document.getElementById("engineDropdown");
        let html = "";
        searchEngines.forEach(eng => {
            const icon = eng.icon && eng.icon.startsWith("http") ? eng.icon : getFavicon(eng.urlTemplate);
            html += `<div class="dropdown-item" data-name="${escapeHtml(eng.name)}"><img src="${icon}"> ${eng.name} ${eng.active ? "✓" : ""}</div>`;
        });
        dropdown.innerHTML = html;
        document.querySelectorAll("#engineDropdown .dropdown-item").forEach(el => {
            el.addEventListener("click", () => {
                const name = el.getAttribute("data-name");
                const engine = searchEngines.find(e => e.name === name);
                if (engine) {
                    searchEngines.forEach(e => e.active = false);
                    engine.active = true;
                    currentEngine = engine;
                    document.getElementById("currentEngineIcon").src = engine.icon && engine.icon.startsWith("http") ? engine.icon : getFavicon(engine.urlTemplate);
                    dropdown.style.display = "none";
                }
            });
        });
    }
    
    function performSearch() {
        const query = document.getElementById("engineQueryInput").value;
        if (!query.trim()) return;
        const engine = currentEngine || searchEngines[0];
        window.open(engine.urlTemplate.replace("%s", encodeURIComponent(query)), "_blank");
    }
    
    function toggleBookmarkBar() {
        const bookmarkBar = document.getElementById("bookmarkBarContainer");
        const toggleIcon = document.getElementById("toggleIcon");
        isBookmarkBarCollapsed = !isBookmarkBarCollapsed;
        if (isBookmarkBarCollapsed) {
            bookmarkBar.classList.add("collapsed");
            toggleIcon.className = "fas fa-chevron-down";
        } else {
            bookmarkBar.classList.remove("collapsed");
            toggleIcon.className = "fas fa-chevron-up";
        }
    }
    
    // ==================== CALENDAR ====================
    let activeCalendar = null;
    let activeTooltip = null;
    
    function showTooltip(event, text) {
        if (activeTooltip) activeTooltip.remove();
        const tooltip = document.createElement('div');
        tooltip.className = 'holiday-tooltip';
        tooltip.innerText = text;
        document.body.appendChild(tooltip);
        const rect = event.target.getBoundingClientRect();
        tooltip.style.left = `${rect.left + 10}px`;
        tooltip.style.top = `${rect.top - 30}px`;
        activeTooltip = tooltip;
    }
    
    function hideTooltip() {
        if (activeTooltip) { activeTooltip.remove(); activeTooltip = null; }
    }
    
    function showCalendarPopup(anchorBtn) {
        if (activeCalendar) { activeCalendar.remove(); activeCalendar = null; return; }
        const popup = document.createElement('div');
        popup.className = 'calendar-popup';
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        
        function renderCal(year, month) {
            const firstDay = new Date(year, month, 1);
            const startDay = firstDay.getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let html = `<div class="calendar-header"><button class="prevCalBtn"><i class="fas fa-chevron-left"></i></button><span class="calMonthYear">${firstDay.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</span><button class="nextCalBtn"><i class="fas fa-chevron-right"></i></button></div><div class="calendar-grid">`;
            const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            weekdays.forEach(d => html += `<div class="calendar-weekday">${d}</div>`);
            for (let i = 0; i < startDay; i++) html += `<div></div>`;
            for (let d = 1; d <= daysInMonth; d++) {
                const dayOfWeek = (startDay + d - 1) % 7;
                const isFriSat = dayOfWeek === 5 || dayOfWeek === 6;
                const currentDate = new Date(year, month, d);
                const dateKey = formatDateToYMD(currentDate);
                const holiday = holidayMap.get(dateKey);
                const isHoliday = !!holiday;
                const isToday = d === new Date().getDate() && year === new Date().getFullYear() && month === new Date().getMonth();
                let dayClass = '';
                if (isHoliday) dayClass = 'holiday-day';
                else if (isFriSat) dayClass = 'friday-sat';
                if (isToday && !isHoliday) dayClass = 'current-day';
                html += `<div class="calendar-day ${dayClass}" data-date="${dateKey}" data-holiday-subject="${isHoliday ? escapeHtml(holiday.subject) : ''}">${d}</div>`;
            }
            html += `</div>`;
            popup.innerHTML = html;
            popup.querySelectorAll('.calendar-day[data-holiday-subject]').forEach(dayEl => {
                const subject = dayEl.getAttribute('data-holiday-subject');
                if (subject) {
                    dayEl.addEventListener('mouseenter', (e) => showTooltip(e, subject));
                    dayEl.addEventListener('mouseleave', hideTooltip);
                }
            });
            popup.querySelector('.prevCalBtn').onclick = (e) => { e.stopPropagation(); let nm = month - 1; let ny = year; if (nm < 0) { nm = 11; ny--; } renderCal(ny, nm); };
            popup.querySelector('.nextCalBtn').onclick = (e) => { e.stopPropagation(); let nm = month + 1; let ny = year; if (nm > 11) { nm = 0; ny++; } renderCal(ny, nm); };
        }
        renderCal(currentYear, currentMonth);
        const rect = anchorBtn.getBoundingClientRect();
        popup.style.position = 'fixed';
        popup.style.top = `${rect.bottom + 5}px`;
        popup.style.right = `${window.innerWidth - rect.right + 5}px`;
        document.body.appendChild(popup);
        activeCalendar = popup;
        const closeHandler = (e) => {
            if (!popup.contains(e.target) && e.target !== anchorBtn && !anchorBtn.contains(e.target)) {
                if (activeCalendar) { activeCalendar.remove(); activeCalendar = null; }
                hideTooltip();
                document.removeEventListener('click', closeHandler);
            }
        };
        setTimeout(() => document.addEventListener('click', closeHandler), 100);
    }
    
    // ==================== CLOCK ====================
    function updateClock() {
        const now = new Date();
        let hours = now.getHours() % 12 || 12;
        const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
        const minutes = String(now.getMinutes()).padStart(2,'0');
        const seconds = String(now.getSeconds()).padStart(2,'0');
        document.getElementById("clockDisplay").innerText = `${hours}:${minutes}:${seconds} ${ampm}`;
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById("dateDisplay").innerText = now.toLocaleDateString('en-US', options);
    }
    
    // ==================== REFRESH ====================
    async function refreshAll() {
        document.getElementById('cacheIndicator').innerHTML = '🔄 Refreshing...';
        await Promise.all([
            loadHolidays(true),
            loadCsvCategoryBookmarks(true),
            loadSearchEngines(true),
            (async () => { toolbarItems = await loadToolbar(true); })()
        ]);
        csvCategoryBookmarks = await loadCsvCategoryBookmarks(true);
        searchEngines = await loadSearchEngines(true);
        toolbarItems = await loadToolbar(true);
        renderCategories();
        renderBookmarkBar(toolbarItems);
        renderEngineDropdown();
        allBookmarksForSearch = [];
        for (const item of toolbarItems) flattenForSearch([item], allBookmarksForSearch);
        document.getElementById('cacheIndicator').innerHTML = `✅ Updated ${new Date().toLocaleTimeString()}`;
        setTimeout(() => { if(document.getElementById('cacheIndicator').innerHTML.includes('Updated')) document.getElementById('cacheIndicator').innerHTML = `📚 Cached`; }, 3000);
    }
    
    // ==================== INIT ====================
    document.getElementById("toggleIconBtn").addEventListener("click", toggleBookmarkBar);
    document.getElementById("calendarBtn").addEventListener("click", (e) => { e.stopPropagation(); showCalendarPopup(e.currentTarget); });
    document.getElementById("editSheetBtn").addEventListener("click", () => { window.open(EDIT_SHEET_URL, "_blank"); });
    document.getElementById("refreshCsvBtn").addEventListener("click", refreshAll);
    document.getElementById("engineSearchBtn").addEventListener("click", performSearch);
    document.getElementById("engineQueryInput").addEventListener("keypress", e => { if (e.key === "Enter") performSearch(); });
    document.getElementById("bookmarkSearchInput").addEventListener("input", e => updateBookmarkSearchPopup(e.target.value));
    document.getElementById("clearBookmarkSearch").addEventListener("click", () => { document.getElementById("bookmarkSearchInput").value = ""; updateBookmarkSearchPopup(""); });
    
    setInterval(updateClock, 1000);
    updateClock();
    
    async function init() {
        try {
            document.getElementById('cacheIndicator').innerHTML = '📦 Loading from cache...';
            // Load from cache first (instant)
            const cachedCategories = localStorage.getItem(CACHE_KEY_CATEGORIES);
            if (cachedCategories) {
                try {
                    const { data } = JSON.parse(cachedCategories);
                    if (data) {
                        const rows = data.split(/\r?\n/);
                        const parsed = [];
                        for (let i = 1; i < rows.length; i++) {
                            const parts = rows[i].split(',');
                            if (parts.length >= 3) {
                                let name = parts[0].replace(/^"|"$/g, '');
                                let url = parts[1].replace(/^"|"$/g, '');
                                let category = parts[2] ? parts[2].replace(/^"|"$/g, '') : "Uncategorized";
                                if (name && url && url.startsWith("http")) {
                                    parsed.push({ name, url, category: category.trim(), icon: "" });
                                }
                            }
                        }
                        if (parsed.length) csvCategoryBookmarks = parsed;
                        renderCategories();
                    }
                } catch(e) {}
            }
            
            const cachedToolbar = localStorage.getItem(CACHE_KEY_TOOLBAR);
            if (cachedToolbar) {
                try {
                    const { data } = JSON.parse(cachedToolbar);
                    if (data) {
                        const toolbarRaw = extractToolbarChildren(data);
                        const items = [];
                        for (const child of toolbarRaw) { const conv = convertNode(child); if (conv) items.push(conv); }
                        if (items.length) toolbarItems = items;
                        renderBookmarkBar(toolbarItems);
                        allBookmarksForSearch = [];
                        for (const item of toolbarItems) flattenForSearch([item], allBookmarksForSearch);
                    }
                } catch(e) {}
            }
            
            const cachedSearch = localStorage.getItem(CACHE_KEY_SEARCH_ENGINES);
            if (cachedSearch) {
                try {
                    const { data } = JSON.parse(cachedSearch);
                    if (data) {
                        const rows = data.split(/\r?\n/);
                        const engines = [];
                        for (let i = 1; i < rows.length; i++) {
                            const parts = rows[i].split(',');
                            if (parts.length >= 3) {
                                let name = parts[0].replace(/^"|"$/g, '');
                                let urlTemplate = parts[1].replace(/^"|"$/g, '');
                                let useIt = parts[2]?.toLowerCase();
                                if (urlTemplate && !urlTemplate.includes("%s")) {
                                    urlTemplate += urlTemplate.includes("?") ? "&q=%s" : "?q=%s";
                                }
                                const active = (useIt === "yes" || useIt === "y" || useIt === "true");
                                engines.push({ name, urlTemplate, active, icon: "" });
                            }
                        }
                        if (engines.length) searchEngines = engines;
                        if (!searchEngines.some(e => e.active)) searchEngines[0].active = true;
                        currentEngine = searchEngines.find(e => e.active);
                        document.getElementById("currentEngineIcon").src = getFavicon(currentEngine.urlTemplate);
                        renderEngineDropdown();
                    }
                } catch(e) {}
            }
            
            const cachedHolidays = localStorage.getItem(CACHE_KEY_HOLIDAYS);
            if (cachedHolidays) {
                try {
                    const { data } = JSON.parse(cachedHolidays);
                    if (data) {
                        const rows = data.split(/\r?\n/);
                        const holidays = new Map();
                        for (let i = 1; i < rows.length; i++) {
                            const parts = rows[i].split(',');
                            if (parts.length >= 2) {
                                let startDateStr = parts[1]?.replace(/^"|"$/g, '');
                                let subject = parts[3]?.replace(/^"|"$/g, '') || "Holiday";
                                let startYMD = parseDMYToYMD(startDateStr);
                                if (startYMD) holidays.set(startYMD, { subject, description: "" });
                            }
                        }
                        if (holidays.size) holidayMap = holidays;
                    }
                } catch(e) {}
            }
            
            document.getElementById('cacheIndicator').innerHTML = '🔄 Background update...';
            // Background refresh
            Promise.all([
                loadHolidays(true),
                loadCsvCategoryBookmarks(true),
                loadSearchEngines(true),
                loadToolbar(true)
            ]).then(async () => {
                csvCategoryBookmarks = await loadCsvCategoryBookmarks(true);
                searchEngines = await loadSearchEngines(true);
                toolbarItems = await loadToolbar(true);
                await loadHolidays(true);
                renderCategories();
                renderBookmarkBar(toolbarItems);
                renderEngineDropdown();
                allBookmarksForSearch = [];
                for (const item of toolbarItems) flattenForSearch([item], allBookmarksForSearch);
                document.getElementById('cacheIndicator').innerHTML = `✅ Live data loaded`;
                setTimeout(() => { if(document.getElementById('cacheIndicator').innerHTML.includes('Live')) document.getElementById('cacheIndicator').innerHTML = `📚 Cached`; }, 2000);
            }).catch(e => console.warn("Background refresh failed", e));
            
            const engineBtn = document.getElementById("engineSelectorBtn");
            const engineDrop = document.getElementById("engineDropdown");
            engineBtn.addEventListener("click", (e) => { e.stopPropagation(); engineDrop.style.display = engineDrop.style.display === "none" ? "block" : "none"; });
            document.addEventListener("click", (e) => { 
                if (!engineBtn.contains(e.target) && !engineDrop.contains(e.target)) engineDrop.style.display = "none";
                if (!document.querySelector(".bookmark-search-wrapper").contains(e.target)) document.getElementById("bookmarkSearchDropdown").style.display = "none";
                closePopup();
            });
            
            const profileImg = document.getElementById("profileImage");
            if (profileImg.complete && profileImg.naturalHeight === 0) {
                profileImg.style.display = 'none';
                document.getElementById('fallbackIcon').style.display = 'flex';
            }
        } catch(err) { console.error(err); document.getElementById("categoriesContainer").innerHTML = `<div class="empty-cat">Error: ${err.message}</div>`; }
    }
    init();
</script>
